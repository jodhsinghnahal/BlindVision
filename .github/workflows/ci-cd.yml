name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: blindvision-main
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Python 3.10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

  deploy:
    name: Deploy to PythonAnywhere
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          PA_APP_PATH: ${{ secrets.PA_APP_PATH }}
          PA_WSGI_FILE: ${{ secrets.PA_WSGI_FILE }}
          PA_VENV_PATH: ${{ secrets.PA_VENV_PATH }}
        with:
          host: ${{ secrets.PA_SSH_HOST }}
          username: ${{ secrets.PA_SSH_USERNAME }}
          key: ${{ secrets.PA_SSH_PRIVATE_KEY }}
          script_stop: true
          envs: PA_APP_PATH,PA_WSGI_FILE,PA_VENV_PATH
          script: |
            set -euo pipefail
            cd "$PA_APP_PATH"
            git pull --ff-only origin main

            if [ -n "${PA_VENV_PATH:-}" ]; then
              source "$PA_VENV_PATH/bin/activate"
            fi

            pip install -r requirements.txt
            touch "$PA_WSGI_FILE"
